kind = "web"
previewPath = "/"
title = "Kishore Orthopedic Centre"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.env]
PORT = "8080"

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "pnpm --filter @workspace/api-server run build"
run = "node --enable-source-maps artifacts/api-server/dist/index.mjs"

[services.production.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
